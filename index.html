<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phaser Game</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HJ7HYJH0Q4"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-HJ7HYJH0Q4');
    </script>

</head>
<body>
    <!-- Instructions Block -->
    <div class="instructions">
        <h2>Game Controls</h2>
        <ul>
            <li>Use arrows <strong>LEFT</strong> and <strong>RIGHT</strong> to move.</li>
            <li>Use <strong>SPACE</strong> to use weapon.</li>
            <li>Use arrows <strong>UP</strong> and <strong>DOWN</strong> to change weapons.</li>
            <li>Use <strong>SHIFT</strong> to escape, when blue button appears on the screen.</li>
            <li>Use letters <strong>Z, X, C, V, B</strong> to use medicine, if it is available.</li>
        </ul>
        <button id="actionButton">Press Me!</button>
    </div>

<!-- Подключение вашего основного скрипта игры -->
<script type="module" src="game.js"></script>
<script>
    document.getElementById('actionButton').addEventListener('click', function() {
        gtag('event', 'button_click', {
            'event_category': 'User Interaction',
            'event_label': 'Press Me Button Clicked'
        });
    });
</script>
</body>
</html>
